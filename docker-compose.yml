# =============================================================================
# Docker Compose — Local Development
#
# Usage:
#   docker compose up --build
#
# Requires NVIDIA Container Toolkit installed on host.
# Mount a local directory for model caching to avoid re-downloads.
# =============================================================================

services:
  ai-platform:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-multi-models
    restart: unless-stopped

    # GPU Access
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "8000:8000"   # FastAPI
      - "8188:8188"   # ComfyUI (optional, for debugging)

    volumes:
      # Persist models between container restarts
      - ./model-cache/models:/workspace/models
      - ./model-cache/hf-cache:/root/.cache/huggingface
      - ./model-cache/comfyui-models:/workspace/ComfyUI/models/checkpoints
      - ./outputs:/workspace/outputs

    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - COMFYUI_PORT=8188
      - COMFYUI_HOST=127.0.0.1
      - MODELS_DIR=/workspace/models
      - COMFYUI_DIR=/workspace/ComfyUI
      - OUTPUT_DIR=/workspace/outputs
      - MIXTRAL_MODEL_PATH=/workspace/models/llm/dolphin-2.7-mixtral-8x7b.Q4_K_M.gguf
      - MIXTRAL_CONTEXT_LENGTH=32768
      - MIXTRAL_GPU_LAYERS=-1
      - WAN_T2V_MODEL=/workspace/models/video/wan2.1-t2v-1.3b
      - WAN_I2V_MODEL=/workspace/models/video/wan2.1-i2v-14b
      - XTTS_MODEL=tts_models/multilingual/multi-dataset/xtts_v2
      - MAX_LOADED_MODELS=3
      - ENABLE_MODEL_OFFLOAD=true

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
